<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRT Food Plus — Pedidos de Almoço</title>
    <meta
      name="description"
      content="Sistema de gestão de pedidos de almoço — Garten Automação"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════════════════
       RESET & GLOBALS
       ═══════════════════════════════════════════════════════ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0a0a1a;
        --bg-secondary: #12122a;
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-hover: rgba(255, 255, 255, 0.08);
        --text-primary: #e8e8f0;
        --text-secondary: #8888a8;
        --text-muted: #555570;
        --accent: #6c5ce7;
        --accent-glow: rgba(108, 92, 231, 0.3);
        --accent-light: #a29bfe;
        --success: #00cec9;
        --success-glow: rgba(0, 206, 201, 0.25);
        --danger: #ff6b6b;
        --danger-glow: rgba(255, 107, 107, 0.2);
        --warning: #ffa726;
        --radius: 16px;
        --radius-sm: 10px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Animated gradient background */
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(108, 92, 231, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(0, 206, 201, 0.06) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 80%,
            rgba(162, 155, 254, 0.04) 0%,
            transparent 50%
          );
        animation: bgShift 20s ease-in-out infinite;
        z-index: -1;
      }

      @keyframes bgShift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        33% {
          transform: translate(-2%, 1%);
        }
        66% {
          transform: translate(1%, -2%);
        }
      }

      /* ═══════════════════════════════════════════════════════
       GLASS CARD UTILITY
       ═══════════════════════════════════════════════════════ */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius);
      }

      /* ═══════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════ */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 0 32px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(10, 10, 26, 0.75);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--glass-border);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent), var(--success));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 900;
        color: white;
        box-shadow: 0 4px 20px var(--accent-glow);
      }

      .logo-text {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(
          135deg,
          var(--text-primary),
          var(--accent-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .logo-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 6px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .header-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .status-dot.open {
        background: var(--success);
        box-shadow: 0 0 8px var(--success-glow);
      }
      .status-dot.closed {
        background: var(--danger);
        box-shadow: 0 0 8px var(--danger-glow);
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(0.85);
        }
      }

      /* ═══════════════════════════════════════════════════════
       MAIN LAYOUT
       ═══════════════════════════════════════════════════════ */
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 24px 120px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* ═══════════════════════════════════════════════════════
       STAT CARDS
       ═══════════════════════════════════════════════════════ */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }

      .stat-card {
        padding: 20px;
        text-align: center;
      }

      .stat-number {
        font-size: 36px;
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--accent-light),
          var(--success)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .stat-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
      }

      /* ═══════════════════════════════════════════════════════
       ORDER PANEL (left corner floating)
       ═══════════════════════════════════════════════════════ */
      .order-panel {
        padding: 24px;
      }

      .order-panel h2 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        color: var(--text-primary);
      }

      .select-wrapper {
        position: relative;
        margin-bottom: 16px;
      }

      .select-wrapper select {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: var(--transition);
        appearance: none;
        outline: none;
        min-height: 150px;
      }

      .select-wrapper select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .select-wrapper select option {
        background: var(--bg-secondary);
        color: var(--text-primary);
        padding: 8px;
      }

      .select-hint {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 6px;
        margin-bottom: 12px;
      }

      /* ═══════════════════════════════════════════════════════
       SELECTED CHIPS
       ═══════════════════════════════════════════════════════ */
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
        min-height: 28px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 20px;
        background: linear-gradient(
          135deg,
          rgba(108, 92, 231, 0.2),
          rgba(162, 155, 254, 0.1)
        );
        border: 1px solid rgba(108, 92, 231, 0.3);
        font-size: 13px;
        font-weight: 500;
        color: var(--accent-light);
        animation: chipIn 0.2s ease-out;
      }

      @keyframes chipIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .chip button {
        background: none;
        border: none;
        color: var(--accent-light);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        opacity: 0.6;
        transition: opacity 0.2s;
      }

      .chip button:hover {
        opacity: 1;
      }

      /* ═══════════════════════════════════════════════════════
       BUTTONS
       ═══════════════════════════════════════════════════════ */
      .btn {
        padding: 14px 28px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        letter-spacing: 0.3px;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
        box-shadow: 0 4px 20px var(--accent-glow);
        width: 100%;
      }

      .btn-primary:hover {
        box-shadow: 0 6px 30px rgba(108, 92, 231, 0.5);
        transform: translateY(-1px);
      }

      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-debug {
        background: rgba(255, 167, 38, 0.1);
        border: 1px solid rgba(255, 167, 38, 0.3);
        color: var(--warning);
        font-size: 13px;
        padding: 10px 20px;
      }

      .btn-debug:hover {
        background: rgba(255, 167, 38, 0.2);
      }

      .btn-danger-sm {
        background: rgba(255, 107, 107, 0.1);
        border: 1px solid rgba(255, 107, 107, 0.2);
        color: var(--danger);
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 8px;
      }

      .btn-danger-sm:hover {
        background: rgba(255, 107, 107, 0.2);
      }

      .actions-row {
        display: flex;
        gap: 12px;
        margin-top: 8px;
      }

      /* ═══════════════════════════════════════════════════════
       ORDERS LIST
       ═══════════════════════════════════════════════════════ */
      .orders-section {
        padding: 24px;
      }

      .orders-section h2 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .orders-count {
        font-size: 12px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
        background: rgba(0, 206, 201, 0.15);
        color: var(--success);
      }

      .order-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .order-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        transition: var(--transition);
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .order-item:hover {
        background: var(--glass-hover);
        border-color: var(--glass-border);
      }

      .order-name {
        font-weight: 600;
        font-size: 15px;
      }

      .order-time {
        font-size: 12px;
        color: var(--text-muted);
      }

      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--text-muted);
      }

      .empty-state .emoji {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 14px;
      }

      /* ═══════════════════════════════════════════════════════
       TOAST NOTIFICATIONS
       ═══════════════════════════════════════════════════════ */
      .toast-container {
        position: fixed;
        top: 84px;
        right: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        padding: 14px 20px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-weight: 500;
        animation:
          slideIn 0.3s ease-out,
          fadeOut 0.3s ease-in 2.7s forwards;
        max-width: 360px;
      }

      .toast.success {
        background: rgba(0, 206, 201, 0.15);
        border: 1px solid rgba(0, 206, 201, 0.3);
        color: var(--success);
      }

      .toast.error {
        background: rgba(255, 107, 107, 0.15);
        border: 1px solid rgba(255, 107, 107, 0.3);
        color: var(--danger);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          transform: translateY(-10px);
        }
      }

      /* ═══════════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════════ */
      @media (max-width: 600px) {
        header {
          padding: 0 16px;
        }
        main {
          padding: 16px 12px 100px;
        }
        .logo-text {
          font-size: 18px;
        }
        .stat-number {
          font-size: 28px;
        }
      }

      /* ═══════════════════════════════════════════════════════
       LOADING SPINNER
       ═══════════════════════════════════════════════════════ */
      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid transparent;
        border-top: 2px solid currentColor;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══ HEADER ═══ -->
    <header>
      <div class="logo">
        <div class="logo-icon">G</div>
        <span class="logo-text">GRT Food</span>
        <span class="logo-badge">Plus</span>
      </div>
      <div class="header-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Carregando...</span>
      </div>
    </header>

    <!-- ═══ TOAST ═══ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ═══ MAIN ═══ -->
    <main>
      <!-- Stats -->
      <div class="stats">
        <div class="glass stat-card">
          <div class="stat-number" id="totalPedidos">0</div>
          <div class="stat-label">Pedidos Hoje</div>
        </div>
        <div class="glass stat-card">
          <div class="stat-number" id="totalUsuarios">0</div>
          <div class="stat-label">Usuários</div>
        </div>
      </div>

      <!-- Order Panel -->
      <div class="glass order-panel">
        <h2>📋 Fazer Pedido</h2>

        <div class="chips" id="selectedChips"></div>

        <div class="select-wrapper">
          <select id="userSelect" multiple size="6">
            <option disabled>Carregando nomes...</option>
          </select>
        </div>
        <p class="select-hint">
          Segure Ctrl (ou Cmd) para selecionar vários nomes
        </p>

        <button class="btn btn-primary" id="btnPedido" disabled>
          🍽️ Registrar Pedidos
        </button>

        <div class="actions-row">
          <button class="btn btn-debug" id="btnEmail">
            📧 Enviar Email (Debug)
          </button>
        </div>
      </div>

      <!-- Orders List -->
      <div class="glass orders-section">
        <h2>
          Pedidos de Hoje
          <span class="orders-count" id="ordersCount">0</span>
        </h2>
        <div class="order-list" id="orderList">
          <div class="empty-state">
            <div class="emoji">🍽️</div>
            <p>Nenhum pedido registrado ainda hoje.</p>
          </div>
        </div>
      </div>
    </main>

    <script>
      /* ═══════════════════════════════════════════════════════
       API HELPERS
       ═══════════════════════════════════════════════════════ */
      const API = ""; // Same origin

      async function api(path, opts = {}) {
        const res = await fetch(`${API}${path}`, {
          headers: { "Content-Type": "application/json" },
          ...opts,
        });
        if (!res.ok) {
          const err = await res
            .json()
            .catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || res.statusText);
        }
        if (res.status === 204) return null;
        return res.json();
      }

      /* ═══════════════════════════════════════════════════════
       TOAST
       ═══════════════════════════════════════════════════════ */
      function toast(msg, type = "success") {
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.textContent = msg;
        document.getElementById("toastContainer").appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }

      /* ═══════════════════════════════════════════════════════
       STATE
       ═══════════════════════════════════════════════════════ */
      let usuarios = [];
      let pedidos = [];
      let estado = "Fechado";

      /* ═══════════════════════════════════════════════════════
       RENDER FUNCTIONS
       ═══════════════════════════════════════════════════════ */
      function renderUsuarios() {
        const sel = document.getElementById("userSelect");
        sel.innerHTML = "";
        usuarios.forEach((u) => {
          const opt = document.createElement("option");
          opt.value = u.id;
          opt.textContent = u.nome;
          sel.appendChild(opt);
        });
        document.getElementById("totalUsuarios").textContent = usuarios.length;
      }

      function renderPedidos() {
        const list = document.getElementById("orderList");
        const countEl = document.getElementById("ordersCount");
        document.getElementById("totalPedidos").textContent = pedidos.length;
        countEl.textContent = pedidos.length;

        if (pedidos.length === 0) {
          list.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🍽️</div>
            <p>Nenhum pedido registrado ainda hoje.</p>
          </div>`;
          return;
        }

        list.innerHTML = pedidos
          .map(
            (p) => `
        <div class="order-item">
          <div>
            <div class="order-name">${escapeHtml(p.usuario)}</div>
            <div class="order-time">${p.dataDoPedido || ""}</div>
          </div>
          <button class="btn btn-danger-sm" onclick="deletarPedido(${p.id})">✕ Remover</button>
        </div>
      `,
          )
          .join("");
      }

      function renderEstado() {
        const dot = document.getElementById("statusDot");
        const txt = document.getElementById("statusText");
        const isOpen = estado === "Aberto";
        dot.className = `status-dot ${isOpen ? "open" : "closed"}`;
        txt.textContent = isOpen ? "● Pedidos Abertos" : "○ Pedidos Encerrados";
      }

      function updateChips() {
        const sel = document.getElementById("userSelect");
        const chips = document.getElementById("selectedChips");
        const btn = document.getElementById("btnPedido");
        const selected = Array.from(sel.selectedOptions);

        chips.innerHTML = selected
          .map(
            (opt) => `
        <span class="chip">
          ${escapeHtml(opt.textContent)}
          <button onclick="deselectUser(${opt.value})" title="Remover">&times;</button>
        </span>
      `,
          )
          .join("");

        btn.disabled = selected.length === 0;
      }

      function deselectUser(id) {
        const sel = document.getElementById("userSelect");
        const opt = sel.querySelector(`option[value="${id}"]`);
        if (opt) opt.selected = false;
        updateChips();
      }

      function escapeHtml(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      /* ═══════════════════════════════════════════════════════
       ACTIONS
       ═══════════════════════════════════════════════════════ */
      async function fazerPedidos() {
        const sel = document.getElementById("userSelect");
        const selected = Array.from(sel.selectedOptions);
        if (selected.length === 0) return;

        const btn = document.getElementById("btnPedido");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Registrando...';

        let ok = 0,
          fail = 0;
        for (const opt of selected) {
          try {
            await api("/api/pedidos", {
              method: "POST",
              body: JSON.stringify({
                usuario_id: parseInt(opt.value),
                pedido: { items: ["Almoço"], multiplos: {} },
                obs: "",
              }),
            });
            ok++;
          } catch (e) {
            fail++;
            console.error(`Erro ao registrar ${opt.textContent}:`, e);
          }
        }

        sel.selectedOptions &&
          Array.from(sel.options).forEach((o) => (o.selected = false));
        updateChips();

        if (ok > 0) toast(`${ok} pedido(s) registrado(s)!`, "success");
        if (fail > 0) toast(`${fail} pedido(s) falharam.`, "error");

        btn.innerHTML = "🍽️ Registrar Pedidos";
        await loadPedidos();
      }

      async function deletarPedido(id) {
        try {
          await api(`/api/pedidos/${id}`, { method: "DELETE" });
          toast("Pedido removido!", "success");
          await loadPedidos();
        } catch (e) {
          toast("Erro ao remover: " + e.message, "error");
        }
      }

      async function enviarEmailDebug() {
        const btn = document.getElementById("btnEmail");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Enviando...';
        try {
          await api("/api/mail/test");
          toast("Email de teste enviado!", "success");
        } catch (e) {
          toast("Erro ao enviar: " + e.message, "error");
        }
        btn.disabled = false;
        btn.innerHTML = "📧 Enviar Email (Debug)";
      }

      /* ═══════════════════════════════════════════════════════
       DATA LOADING
       ═══════════════════════════════════════════════════════ */
      async function loadUsuarios() {
        try {
          usuarios = await api("/api/usuarios");
          renderUsuarios();
        } catch (e) {
          toast("Erro ao carregar nomes: " + e.message, "error");
        }
      }

      async function loadPedidos() {
        try {
          pedidos = await api("/api/pedidos");
          renderPedidos();
        } catch (e) {
          toast("Erro ao carregar pedidos: " + e.message, "error");
        }
      }

      async function loadEstado() {
        try {
          const data = await api("/api/estado");
          estado = data.estado;
          renderEstado();
        } catch (e) {
          console.error("Estado:", e);
        }
      }

      /* ═══════════════════════════════════════════════════════
       WEBSOCKET REAL-TIME
       ═══════════════════════════════════════════════════════ */
      function connectWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(`${proto}//${location.host}/ws`);

        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.tipo === "estado") {
              estado = msg.dados;
              renderEstado();
            }
            if (msg.tipo === "pedidos") {
              loadPedidos();
            }
          } catch {}
        };

        ws.onclose = () => setTimeout(connectWS, 3000);
        ws.onerror = () => ws.close();
      }

      /* ═══════════════════════════════════════════════════════
       INIT
       ═══════════════════════════════════════════════════════ */
      document
        .getElementById("userSelect")
        .addEventListener("change", updateChips);
      document
        .getElementById("btnPedido")
        .addEventListener("click", fazerPedidos);
      document
        .getElementById("btnEmail")
        .addEventListener("click", enviarEmailDebug);

      Promise.all([loadUsuarios(), loadPedidos(), loadEstado()]).then(() => {
        connectWS();
      });
    </script>
  </body>
</html>
